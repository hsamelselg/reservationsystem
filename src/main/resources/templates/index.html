<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restorani Saaliplaan</title>
    <style>
        .floor-plan {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #333;
            background-color: #f9f9f9;
            margin: 20px auto;
        }
        .table-icon {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #4CAF50;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 2px 2px 5 px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Restorani saaliplaan</h1>
    <div style="margin-bottom: 20px; padding: 15px; background-color: #f4f4f4; border-radius: 8px;">
        <form action="/search" method="get" style="display: flex; gap: 15px; align-items: flex-end; justify-content: center;">
            <div>
                <label>Inimeste arv:</label><br>
                <input type="number" name="people" min="1" max="10" required style="padding: 5px;">
            </div>
            <div>
                <label>Kuupäev ja kellaaeg:</label><br>
                <input type="datetime-local" name="dateTime" required style="padding: 5px;">
            </div>
            <button type="submit" style="padding: 5px 15px; background-color: #4CAF50; color: white; border: none; cursor: pointer;">
                OTSI VABU LAUDU
            </button>
        </form>
    </div>
    <div id="floor-plan" style="position: relative; width: 800px; height: 500px; border: 3px solid black; margin: 0 auto; background-color: #fdfdfd;">

        <div style="position: absolute; left: 520px; top: 0; bottom: 0; width: 2px; background-color: black;"></div>

        <div style="position: absolute; left: 230px; bottom: 10px; font-weight: bold; font-size: 20px; opacity: 0.3;">SAAL</div>
        <div style="position: absolute; left: 620px; bottom: 10px; font-weight: bold; font-size: 20px; opacity: 0.3;">TERASS</div>

        <div th:each="t : ${tables}" th:if="${t != null}">
            <div class="table-icon"
                 th:style="|
        position: absolute;
        left: ${t.coordinateX}px;
        top: ${t.coordinateY}px;
        width: ${(t.size == 6 ? 150 : (t.size == 4 ? 100 : 60))}px;
        height: 50px;
        background-color: ${(isSearch == true && availableTables != null && availableTables.contains(t))
            ? '#4CAF50'
            : (t.zone == 'Terass' ? '#90caf9' : '#8d6e63')};
        border: 2px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
    |">
                <a th:if="${isSearch == true && availableTables != null && availableTables.contains(t)}"
                   href="javascript:void(0);"
                   th:onclick="openModal([[${t.id}]], [[${t.size}]], [[${selectedDateTime}]])"
                   style="color: white; text-decoration: underline; cursor: pointer;">
                    <span th:text="${t.size} + 'p'"></span>
                </a>

                <span th:unless="${isSearch == true && availableTables != null && availableTables.contains(t)}"
                      th:text="${t.size} + 'p'"></span>
            </div>
        </div>
    </div>
    <div id="bookingModal" style="display:none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);">
        <div style="background-color: white; margin: 15% auto; padding: 20px; border-radius: 10px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <h3 id="modalTitle">Broneeri laud</h3>
            <p id="modalInfo"></p>

            <form action="/confirm-reservation" method="post">
                <input type="hidden" id="modalTableId" name="tableId">
                <input type="hidden" id="modalDate" name="resvDate">

                <div style="margin-bottom: 10px;">
                    <label>Nimi:</label><br>
                    <input type="text" name="clientName" required style="width: 100%; padding: 5px;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Telefon:</label><br>
                    <input type="tel" name="clientPhone" required style="width: 100%; padding: 5px;">
                </div>

                <button type="submit" style="background-color: #4CAF50; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; border-radius: 5px;">
                    BRONEERI
                </button>
                <button type="button" onclick="closeModal()" style="background-color: #ccc; margin-top: 5px; border: none; width: 100%; padding: 5px; cursor: pointer;">
                    Tühista
                </button>
            </form>
        </div>
    </div>
    <script>
        function openModal(tableId, size, dateTime) {
            document.getElementById('modalTableId').value = tableId;
            document.getElementById('modalDate').value = dateTime;
            document.getElementById('modalInfo').innerText = "Laud nr " + tableId + " (" + size + " inimest) - Aeg: " + dateTime;
            document.getElementById('bookingModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = "none";
        }

        // Kui klõpsatakse aknast väljapoole, sulge aken
        window.onclick = function(event) {
            let modal = document.getElementById('bookingModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
